sonar.projectKey=KabirMoulana_springboot-cicd
sonar.organization=kabirmoulana
sonar.projectName=springboot-cicd
sonar.projectVersion=1.0.0

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports,target/failsafe-reports

# Exclusions
sonar.exclusions=\
  src/main/java/com/devops/app/Application.java,\
  src/main/java/com/devops/app/config/WebConfig.java

sonar.test.exclusions=src/test/**

# Quality Gate
sonar.qualitygate.wait=false
