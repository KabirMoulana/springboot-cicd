spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskdb}
    username: ${DATABASE_USER:taskuser}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: TaskHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.devops.app: INFO
