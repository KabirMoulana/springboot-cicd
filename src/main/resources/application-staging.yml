spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskdb_staging}
    username: ${DATABASE_USER:taskuser}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.devops.app: DEBUG

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
