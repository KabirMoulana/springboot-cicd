spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: never  # Don't run data.sql in tests

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

logging:
  level:
    root: WARN
    com.devops.app: INFO
