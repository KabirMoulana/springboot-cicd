apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: springboot-cicd-staging

resources:
  - ../../base

namePrefix: staging-

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: springboot-cicd
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
    target:
      kind: HorizontalPodAutoscaler
      name: springboot-cicd

commonLabels:
  environment: staging
