apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: springboot-cicd
  namespace: springboot-cicd
spec:
  podSelector:
    matchLabels:
      app: springboot-cicd
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Allow traffic from Prometheus
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
    # Allow PostgreSQL
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: springboot-cicd
      ports:
        - protocol: TCP
          port: 5432
    # Allow HTTPS (external calls if needed)
    - ports:
        - protocol: TCP
          port: 443
