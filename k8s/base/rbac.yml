# Role: read-only access to configmaps/secrets (for Spring Cloud Kubernetes)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: springboot-cicd-role
  namespace: springboot-cicd
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: springboot-cicd-rolebinding
  namespace: springboot-cicd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: springboot-cicd-role
subjects:
  - kind: ServiceAccount
    name: springboot-cicd
    namespace: springboot-cicd
