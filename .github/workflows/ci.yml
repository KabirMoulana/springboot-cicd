name: CI — Test & Quality

on:
  push:
    branches: ["main", "develop", "feature/**", "fix/**"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Unit Tests + Coverage
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run unit tests
        run: ./mvnw test -B -Dsurefire.failIfNoSpecifiedTests=false

      - name: Generate JaCoCo report
        run: ./mvnw jacoco:report -B

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
        continue-on-error: true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/**/*.xml

      - name: Upload JaCoCo report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 2: Code Quality (SonarCloud)
  # ─────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud needs full history

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B verify sonar:sonar -Psonar \
            -Dsonar.projectKey=KabirMoulana_springboot-cicd \
            -Dsonar.organization=kabirmoulana \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -DskipTests
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 3: Security Scan (OWASP)
  # ─────────────────────────────────────────────
  security:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-owasp-

      - name: Run OWASP dependency check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -B \
            -DfailBuildOnCVSS=9 \
            -DnvdApiKey=${NVD_API_KEY:-""} \
            -Dformats=HTML,JSON \
            -DretryCount=3 \
            -DconnectionTimeout=60000
        continue-on-error: true   # Don't block pipeline on NVD rate limits

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report*
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 4: Lint / Static Analysis
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Compile Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compile (fail fast on syntax errors)
        run: ./mvnw compile -B

      - name: Check for TODO/FIXME in production code
        run: |
          count=$(grep -rn "TODO\|FIXME\|HACK\|XXX" src/main/java/ || true | wc -l)
          echo "Found $count TODO/FIXME markers"
          if [ "$count" -gt 20 ]; then
            echo "Too many TODO/FIXME markers: $count (max: 20)"
            exit 1
          fi
