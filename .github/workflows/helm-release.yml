name: Helm Chart Release

on:
  push:
    tags:
      - "helm-v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release-chart:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Add Bitnami repo
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Update chart dependencies
        run: helm dependency update helm/springboot-cicd

      - name: Package chart
        run: |
          helm package helm/springboot-cicd --destination .helm-packages
          ls -la .helm-packages/

      - name: Login to GHCR for OCI chart push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR OCI registry
        run: |
          for chart in .helm-packages/*.tgz; do
            helm push "$chart" oci://ghcr.io/${{ github.repository_owner }}/charts
          done

      - name: Create chart release notes
        run: |
          VERSION=$(helm show chart helm/springboot-cicd | grep '^version:' | awk '{print $2}')
          echo "## Helm Chart v${VERSION}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Install" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo "helm install springboot-cicd oci://ghcr.io/${{ github.repository_owner }}/charts/springboot-cicd --version ${VERSION}" >> release-notes.md
          echo '```' >> release-notes.md

      - name: Upload packaged chart as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: .helm-packages/
          retention-days: 90
