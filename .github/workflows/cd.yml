name: CD — Build & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      short-sha: ${{ steps.vars.outputs.short-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "short-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests before build
        run: ./mvnw test -B -q

      - name: Build JAR
        run: ./mvnw package -B -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true

      - name: Output image digest
        run: echo "Image digest ${{ steps.build.outputs.digest }}"

  # ─────────────────────────────────────────────
  # Job 2: Deploy to Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: http://${{ secrets.STAGING_HOST }}:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          timeout: 120s
          script: |
            set -e

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ needs.build.outputs.short-sha }}"
            echo "Deploying image: $IMAGE"

            # Pull new image
            docker pull "$IMAGE"

            # Stop and remove old container if exists
            docker stop springboot-staging 2>/dev/null || true
            docker rm springboot-staging 2>/dev/null || true

            # Run new container
            docker run -d \
              --name springboot-staging \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=staging \
              -e DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" \
              -e DATABASE_USER="${{ secrets.STAGING_DATABASE_USER }}" \
              -e DATABASE_PASSWORD="${{ secrets.STAGING_DATABASE_PASSWORD }}" \
              "$IMAGE"

            echo "Container started"

      - name: Smoke test staging
        run: |
          echo "Waiting for application to start..."
          for i in $(seq 1 15); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.STAGING_HOST }}:8080/actuator/health 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Staging health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ Staging health check failed after 15 attempts"
          exit 1

      - name: API smoke test
        run: |
          # Verify API is functional
          curl -sf http://${{ secrets.STAGING_HOST }}:8080/api/ \
            -H "Accept: application/json" | \
            jq -e '.status == "UP"' || exit 1
          echo "✅ API smoke test passed"

  # ─────────────────────────────────────────────
  # Job 3: Deploy to Production (Blue/Green)
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production (Blue/Green)
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment:
      name: production
      url: http://${{ secrets.PROD_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Blue/Green deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          timeout: 180s
          script: |
            set -e

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ needs.build.outputs.short-sha }}"
            echo "Blue/Green deploy: $IMAGE"

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Determine active and idle slots
            ACTIVE_PORT=8080
            IDLE_PORT=8081
            if docker ps --format '{{.Names}}' | grep -q "springboot-green"; then
              ACTIVE="green"; IDLE="blue"
              ACTIVE_PORT=8080; IDLE_PORT=8081
            else
              ACTIVE="blue"; IDLE="green"
              ACTIVE_PORT=8081; IDLE_PORT=8080
            fi
            echo "Active: $ACTIVE ($ACTIVE_PORT) → deploying to: $IDLE ($IDLE_PORT)"

            # Pull new image
            docker pull "$IMAGE"

            # Start new (idle) container
            docker stop springboot-$IDLE 2>/dev/null || true
            docker rm springboot-$IDLE 2>/dev/null || true
            docker run -d \
              --name springboot-$IDLE \
              --restart unless-stopped \
              -p ${IDLE_PORT}:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}" \
              -e DATABASE_USER="${{ secrets.PROD_DATABASE_USER }}" \
              -e DATABASE_PASSWORD="${{ secrets.PROD_DATABASE_PASSWORD }}" \
              "$IMAGE"

            # Health check on idle container
            echo "Health checking $IDLE on port $IDLE_PORT..."
            for i in $(seq 1 20); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                http://localhost:${IDLE_PORT}/actuator/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ New container healthy"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "❌ New container failed health check — aborting, keeping $ACTIVE"
                docker stop springboot-$IDLE
                exit 1
              fi
              echo "Attempt $i: $STATUS — waiting..."
              sleep 10
            done

            # Swap nginx upstream (if nginx is configured)
            # sudo sed -i "s/localhost:${ACTIVE_PORT}/localhost:${IDLE_PORT}/" /etc/nginx/conf.d/app.conf
            # sudo nginx -s reload

            # Stop old container
            docker stop springboot-$ACTIVE 2>/dev/null || true
            docker rm springboot-$ACTIVE 2>/dev/null || true

            echo "✅ Blue/Green swap complete: $ACTIVE → $IDLE"

            # Prune old images
            docker image prune -f --filter "until=72h"
