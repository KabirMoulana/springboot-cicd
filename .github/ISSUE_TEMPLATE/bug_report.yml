name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug!"
  - type: input
    id: version
    attributes:
      label: Application Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      placeholder: Clear and concise description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell
